<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toupee4U - Hair System Community</title>
    <!-- Prevent indexing of administrative paths -->
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "dark": {
                "950": "#020617",
                "900": "#0f172a",
                "800": "#1e293b",
                "700": "#334155"
              },
              "brand": {
                "blue": "#3b82f6",
                "purple": "#8b5cf6",
                "emerald": "#10b981"
              },
              "science": {
                "50": "rgba(59, 130, 246, 0.1)",
                "100": "rgba(59, 130, 246, 0.2)",
                "500": "#3b82f6",
                "600": "#2563eb",
                "900": "#1d4ed8"
              },
              "kinetic": "#f59e0b",
              "quantum": "#8b5cf6"
            },
            fontFamily: {
              "sans": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"]
            },
            animation: {
              'spin-slow': 'spin 8s linear infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
        
        .staff-selection ::selection {
            background-color: #10b981;
            color: #000;
        }
    </style>
    <script type="importmap">

  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",

    "lucide-react": "https://esm.sh/lucide-react@0.475.0?deps=react@19.0.0",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-router-dom": "https://esm.sh/react-router-dom@7.1.5?deps=react@19.0.0,react-dom@19.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

  }
}
</script>
